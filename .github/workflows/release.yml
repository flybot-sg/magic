name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            7.0.x
            8.0.x

      - name: Setup Babashka
        uses: turtlequeue/setup-babashka@v1.8.0
        with:
          babashka-version: 1.12.213

      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mono-devel

      - name: Build and package nos tarball
        run: bb release-tarball

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/nostrand-${{ github.ref_name }}-mono.tar.gz
          body: |
            See the [README](https://github.com/flybot-sg/magic/blob/${{ github.ref_name }}/README.md) for install + Unity integration instructions.
