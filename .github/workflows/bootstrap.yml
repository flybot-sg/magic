name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 7.0.x

    - name: Checkout
      uses: actions/checkout@v4

    - name: Build and bootstrap MAGIC
      run: dotnet build
